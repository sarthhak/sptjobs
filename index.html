// API
async function callClaude(messages,apiKey,jsonMode=false){
  const body={model:"claude-sonnet-4-20250514",max_tokens:4000,messages};
  if(jsonMode)body.system="You are a JSON generator. Output ONLY a valid JSON array. No markdown, no backticks, no explanation. Start with [ end with ].";
  const headers={"Content-Type":"application/json"};
  if(apiKey)headers["x-api-key"]=apiKey;
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers,body:JSON.stringify(body)});
  if(!res.ok){const t=await res.text().catch(()=>"");throw new Error(`HTTP ${res.status}: ${t.slice(0,100)}`);}
  const d=await res.json();
  if(d.error)throw new Error(d.error.message||"API error");
  const texts=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text);
  if(!texts.length)throw new Error("Empty response");
  return texts.join("\n");
}
function extractJSON(raw){
  const fns=[
    ()=>JSON.parse(raw.trim()),
    ()=>JSON.parse(raw.replace(/```json\n?|```\n?/g,"").trim()),
    ()=>{const s=raw.indexOf("["),e=raw.lastIndexOf("]");if(s<0||e<=s)throw 0;return JSON.parse(raw.slice(s,e+1));},
    ()=>{let t=raw.replace(/```[a-z]*\n?|```/g,"").trim();const s=t.indexOf("["),e=t.lastIndexOf("]");if(s>=0&&e>s)t=t.slice(s,e+1);return JSON.parse(t.replace(/,(\s*[}\]])/g,"$1"));}
  ];
  for(const fn of fns){try{const r=fn();if(Array.isArray(r)&&r.length)return r;}catch{}}
  return null;
}

              <div style=${{display:"flex",gap:8}}>
                <button onClick=${searchJobs} disabled=${searching} style=${{...btnP,opacity:searching?.6:1}}>
                  ${searching?html`<span style=${{width:14,height:14,border:"2px solid rgba(255,255,255,.4)",borderTop:"2px solid #fff",borderRadius:"50%",display:"inline-block",animation:"spin 1s linear infinite"}}/>Searching...`:html`<${Ico} d=${ICONS.search} s=${15} c="#fff"/> Search Jobs`}
                </button>
                <button onClick=${()=>setShowManual(!showManual)} style=${{...btnG}}><${Ico} d=${ICONS.plus} s=${15}/> Manual</button>
              </div>
            </div>
            ${activeKW.length>0&&html`<p style=${{fontSize:11,color:T.textMuted,marginTop:10}}>Searching: ${activeKW.slice(0,4).join(" · ")}${activeKW.length>4?` +${activeKW.length-4}`:""}</p>`}

            ${showManual&&html`
              <div style=${{marginTop:16,padding:16,background:T.primaryLight,border:`1px solid ${T.primaryBorder}`,borderRadius:10}}>
                <p style=${{fontSize:12,color:T.primary,fontWeight:700,marginBottom:12}}>ADD JOB MANUALLY</p>
                <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:10}}>
                  ${[["Title","title"],["Company","company"],["City","city"]].map(([l,f])=>html`
                    <div key=${f}>
                      <label style=${{fontSize:10,fontWeight:700,color:T.textMuted,display:"block",marginBottom:4}}>${l}</label>
                      <input value=${manual[f]} onInput=${e=>setManual(p=>({...p,[f]:e.target.value}))} style=${inp}/>
                    </div>
                  `)}
                </div>
                <textarea value=${manual.jd} onInput=${e=>setManual(p=>({...p,jd:e.target.value}))} placeholder="JD / notes (optional)" style=${{...inp,minHeight:60,resize:"vertical",marginBottom:10}}/>
                <button onClick=${addManual} style=${{...btnP,fontSize:13,padding:"8px 18px"}}>Add Job</button>
              </div>
            `}
          </div>

          ${searchErr&&html`<div style=${{padding:14,background:T.redLight,border:"1px solid #fca5a5",borderRadius:10,fontSize:13,color:T.red}}>⚠ ${searchErr}</div>`}

          ${searching&&html`
            <div style=${{textAlign:"center",padding:52}}>
              <div style=${{width:36,height:36,border:`3px solid ${T.primaryLight}`,borderTop:`3px solid ${T.primary}`,borderRadius:"50%",margin:"0 auto 14px",animation:"spin 1s linear infinite"}}/>
              <p style=${{color:T.textMuted,fontSize:13}}>Finding CDM roles in ${city==="Both"?"Bangalore & Pune":city}...</p>
            </div>
          `}

          ${!searching&&jobs.length>0&&html`
            <div>
              <p style=${{fontSize:12,color:T.textMuted,marginBottom:12}}>${jobs.length} roles found</p>
              <div style=${{display:"flex",flexDirection:"column",gap:12}}>
                ${jobs.map(job=>html`
                  <div key=${job.id} style=${card} class="fade">
                    <div style=${{display:"flex",gap:12,marginBottom:10}}>
                      <div style=${{flex:1}}>
                        <div style=${{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:5}}>
                          <span style=${{fontSize:15,fontWeight:700,color:T.text}}>${job.title}</span>
                          <span style=${{fontSize:11,padding:"2px 9px",borderRadius:100,fontWeight:600,background:job.city==="Bangalore"?T.primaryLight:T.greenLight,color:job.city==="Bangalore"?T.primary:T.green}}>${job.city}</span>
                          <span style=${{fontSize:11,padding:"2px 8px",borderRadius:100,background:"#f1f5f9",color:T.textSec}}>${job.type}</span>
                        </div>
                        <p style=${{fontSize:13,color:T.textSec,marginBottom:7,fontWeight:500}}>${job.company}</p>
                        <p style=${{fontSize:12,color:T.textMuted,lineHeight:1.6,marginBottom:8}}>${job.jdSummary}</p>
                        <div style=${{display:"flex",gap:5,flexWrap:"wrap"}}>
                          ${(job.keySkills||[]).slice(0,5).map(s=>html`<span key=${s} style=${{fontSize:10,padding:"3px 9px",borderRadius:100,background:"#f1f5f9",color:T.textSec,border:`1px solid ${T.border}`}}>${s}</span>`)}
                        </div>
                      </div>
                      <div style=${{textAlign:"center",minWidth:52}}>
                        <div style=${{fontSize:19,fontWeight:800,color:mc(job.matchScore)}}>${job.matchScore}%</div>
                        <div style=${{fontSize:9,color:T.textMuted,letterSpacing:".05em"}}>MATCH</div>
                        <div style=${{marginTop:4,padding:"2px 6px",borderRadius:100,background:mb(job.matchScore),fontSize:9,color:mc(job.matchScore),fontWeight:700}}>${job.matchScore>=80?"High":job.matchScore>=65?"Good":"Fair"}</div>
                      </div>
                    </div>
                    ${job.matchReason&&html`<div style=${{padding:"7px 12px",background:T.greenLight,border:`1px solid ${T.greenBorder}`,borderRadius:8,fontSize:11,color:T.green,marginBottom:10}}>✓ ${job.matchReason}</div>`}
                    <div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>
                      ${DOCS.map(({type,label,c,bg,bc,ico})=>html`
                        <button key=${type} onClick=${()=>generate(job,type)} disabled=${!!generating}
                          style=${{cursor:"pointer",fontFamily:"inherit",fontWeight:500,display:"inline-flex",alignItems:"center",gap:6,padding:"6px 13px",borderRadius:8,border:`1px solid ${bc}`,background:bg,color:c,fontSize:12,opacity:generating===`${job.id}-${type}`?.5:1}}>
                          <${Ico} d=${ico} s=${13} c=${c}/> ${generating===`${job.id}-${type}`?"Writing...":label}
                        </button>
                      `)}
                      <button onClick=${()=>addTrack(job)} style=${{cursor:"pointer",fontFamily:"inherit",fontWeight:500,display:"inline-flex",alignItems:"center",gap:6,padding:"6px 13px",borderRadius:8,border:"1px solid #fde68a",background:"#fefce8",color:T.amber,fontSize:12,marginLeft:"auto"}}>
                        <${Ico} d=${ICONS.plus} s=${13} c=${T.amber}/> Track
                      </button>
                      ${job.applyLink&&html`<a href=${job.applyLink} target="_blank" rel="noopener noreferrer" style=${{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 14px",borderRadius:8,background:T.primary,color:"#fff",fontSize:12,fontWeight:600}}>Apply →</a>`}
                    </div>
                    ${DOCS.map(({type,label,c,bg,bc})=>{
                      const key=`${job.id}-${type}`;
                      const content=generated[key];
                      if(!content)return null;
                      return html`
                        <div key=${type} style=${{marginTop:12,padding:16,background:bg,border:`1px solid ${bc}`,borderRadius:10}}>
                          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                            <span style=${{fontSize:11,fontWeight:700,color:c,letterSpacing:".07em"}}>${label.toUpperCase()}</span>
                            <button onClick=${()=>copyText(content,key)} style=${{cursor:"pointer",fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:5,padding:"4px 11px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:7,color:copied===key?T.green:T.textSec,fontSize:11}}>
                              <${Ico} d=${copied===key?ICONS.check:ICONS.copy} s=${12} c=${copied===key?T.green:T.textSec}/> ${copied===key?"Copied!":"Copy"}
                            </button>
                          </div>
                          <pre style=${{margin:0,fontSize:12,lineHeight:1.75,color:T.text,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>${content}</pre>
                        </div>
                      `;
                    })}
                  </div>
                `)}
              </div>
            </div>
          `}

          ${!searching&&jobs.length===0&&!searchErr&&html`
            <div style=${{textAlign:"center",padding:56}}>
              <div style=${{width:56,height:56,borderRadius:"50%",background:T.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
                <${Ico} d=${ICONS.search} s=${24} c=${T.primary}/>
              </div>
              <p style=${{fontSize:15,fontWeight:600,color:T.text,marginBottom:6}}>Ready to find your internship</p>
              <p style=${{fontSize:13,color:T.textMuted}}>Select keywords, choose a city, hit Search Jobs</p>
              ${!apiKey&&html`<p style=${{fontSize:12,color:T.red,marginTop:8}}>⚠ Set your API key first</p>`}
            </div>
          `}
        </div>
      `}

      ${tab==="tracker"&&html`
        <div>
          <p style=${{fontSize:12,color:T.textMuted,marginBottom:18}}>${tracker.length} applications · Auto-saved to this device</p>
          ${STATUSES.map(status=>{
            const items=tracker.filter(t=>t.status===status);
            const sc=SC[status];
            return html`
              <div key=${status} style=${{marginBottom:24}}>
                <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style=${{width:8,height:8,borderRadius:"50%",background:sc.dot}}/>
                  <span style=${{fontSize:11,fontWeight:700,color:T.textMuted,letterSpacing:".08em"}}>${status.toUpperCase()}</span>
                  <span style=${{fontSize:11,color:T.textMuted}}>(${items.length})</span>
                </div>
                ${items.length===0
                  ?html`<div style=${{padding:"10px 14px",background:"#f8fafc",border:`1px dashed ${T.border}`,borderRadius:9,fontSize:12,color:T.textMuted,textAlign:"center"}}>Empty</div>`
                  :html`<div style=${{display:"flex",flexDirection:"column",gap:8}}>
                    ${items.map(job=>html`
                      <div key=${job.id} style=${card} class="fade">
                        <div style=${{display:"flex",justifyContent:"space-between",gap:10,marginBottom:10}}>
                          <div style=${{flex:1}}>
                            <div style=${{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
                              <span style=${{fontSize:14,fontWeight:700,color:T.text}}>${job.title}</span>
                              <span style=${{fontSize:11,padding:"2px 8px",borderRadius:100,fontWeight:600,background:job.city==="Bangalore"?T.primaryLight:T.greenLight,color:job.city==="Bangalore"?T.primary:T.green}}>${job.city}</span>
                              <span style=${{fontSize:11,padding:"2px 8px",borderRadius:100,background:sc.badge,color:sc.text,fontWeight:600}}>${status}</span>
                            </div>
                            <p style=${{fontSize:12,color:T.textSec}}>${job.company} · ${job.dateAdded}</p>
                          </div>
                          <div style=${{display:"flex",gap:6,flexShrink:0}}>
                            ${job.applyLink&&html`<a href=${job.applyLink} target="_blank" rel="noopener noreferrer" style=${{display:"inline-flex",alignItems:"center",padding:"5px 11px",background:T.primary,color:"#fff",borderRadius:8,fontSize:11,fontWeight:600}}>Apply</a>`}
                            <button onClick=${()=>remTrack(job.id)} style=${{cursor:"pointer",fontFamily:"inherit",display:"inline-flex",alignItems:"center",padding:"5px 8px",background:T.redLight,border:"1px solid #fca5a5",borderRadius:8,color:T.red}}>
                              <${Ico} d=${ICONS.trash} s=${14} c=${T.red}/>
                            </button>
                          </div>
                        </div>
                        <div style=${{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
                          ${STATUSES.map(s=>html`
                            <button key=${s} onClick=${()=>updStatus(job.id,s)}
                              style=${{cursor:"pointer",fontFamily:"inherit",padding:"3px 10px",borderRadius:100,border:`1px solid ${job.status===s?SC[s].dot:T.border}`,background:job.status===s?SC[s].badge:"transparent",color:job.status===s?SC[s].text:T.textSec,fontSize:11,fontWeight:500}}>
                              ${s}
                            </button>
                          `)}
                        </div>
                        <textarea placeholder="Notes: HR name, follow-up date, interview tips..." value=${job.notes} onInput=${e=>updNotes(job.id,e.target.value)}
                          style=${{...inp,minHeight:50,resize:"vertical",fontSize:12,color:T.textSec}}/>
                      </div>
                    `)}
                  </div>`}
              </div>
            `;
          })}
          ${tracker.length===0&&html`
            <div style=${{textAlign:"center",padding:56}}>
              <div style=${{width:56,height:56,borderRadius:"50%",background:T.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><${Ico} d=${ICONS.brief} s=${24} c=${T.primary}/></div>
              <p style=${{fontSize:15,fontWeight:600,color:T.text,marginBottom:6}}>No applications tracked yet</p>
              <p style=${{fontSize:13,color:T.textMuted}}>Search for jobs and tap Track</p>
            </div>
          `}
        </div>
      `}

      ${tab==="profile"&&html`
        <div style=${{display:"flex",flexDirection:"column",gap:14}}>
          <div style=${{background:`linear-gradient(135deg,${T.primaryLight},#f0fdf4)`,border:`1px solid ${T.primaryBorder}`,borderRadius:14,padding:22}}>
            <h2 style=${{fontSize:20,fontWeight:800,color:T.text,marginBottom:4}}>${PROFILE.name}</h2>
            <p style=${{color:T.primary,fontSize:13,fontWeight:500,marginBottom:12}}>${PROFILE.degree}</p>
            <div style=${{display:"flex",gap:14,flexWrap:"wrap",fontSize:12,color:T.textSec}}>
              <span>✉ ${PROFILE.email}</span><span>📱 ${PROFILE.phone}</span><span>📍 ${PROFILE.location}</span>
            </div>
          </div>
          ${[
            {label:"SUMMARY",c:T.textMuted,content:html`<p style=${{fontSize:13,color:T.textSec,lineHeight:1.75,margin:0}}>${PROFILE.summary}</p>`},
            {label:"EXPERIENCE",c:T.textMuted,content:html`<div>${PROFILE.experience.map((e,i)=>html`
              <div key=${i} style=${{marginBottom:i<PROFILE.experience.length-1?18:0}}>
                <p style=${{fontSize:14,fontWeight:700,color:T.text,marginBottom:2}}>${e.role}</p>
                <p style=${{fontSize:12,color:T.primary,fontWeight:500,marginBottom:7}}>${e.company} · ${e.period}</p>
                <ul style=${{paddingLeft:18,margin:0}}>${e.bullets.map((b,j)=>html`<li key=${j} style=${{fontSize:12,color:T.textSec,lineHeight:1.65,marginBottom:4}}>${b}</li>`)}</ul>
              </div>`)}</div>`},
            {label:"SKILLS",c:T.textMuted,content:html`<div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>${PROFILE.skills.map(s=>html`<span key=${s} style=${{fontSize:11,padding:"5px 12px",borderRadius:100,background:T.primaryLight,color:T.primary,border:`1px solid ${T.primaryBorder}`,fontWeight:500}}>${s}</span>`)}</div>`},
            {label:"CERTIFICATIONS IN PROGRESS",c:T.green,content:html`<div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>${PROFILE.certifications.map(c=>html`<span key=${c} style=${{fontSize:11,padding:"5px 12px",borderRadius:100,background:T.greenLight,color:T.green,border:`1px solid ${T.greenBorder}`,fontWeight:500}}>${c}</span>`)}</div>`},
            {label:"TARGET ROLES",c:T.amber,content:html`<div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>${PROFILE.targetRoles.map(r=>html`<span key=${r} style=${{fontSize:11,padding:"5px 12px",borderRadius:100,background:T.amberLight,color:T.amber,border:"1px solid #fde68a",fontWeight:500}}>${r}</span>`)}</div>`}
          ].map(({label,c,content})=>html`
            <div key=${label} style=${card}>
              <p style=${{fontSize:11,fontWeight:700,color:c,letterSpacing:".08em",marginBottom:14}}>${label}</p>
              ${content}
            </div>
          `)}
        </div>
      `}
    </div>
  </div>`;
}

createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
