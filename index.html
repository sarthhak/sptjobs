// ── API ────────────────────────────────────────────────────────────────────
async function callClaude(messages,apiKey){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages})
  });
  if(!res.ok){const t=await res.text().catch(()=>"");throw new Error(`HTTP ${res.status}: ${t.slice(0,100)}`);}
  const d=await res.json();
  if(d.error)throw new Error(d.error.message||"API error");
  return(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

              ${[["Company Name","applyCompany","e.g. IQVIA India"],["Role / Position","applyRole","e.g. Clinical Data Management Intern"],["HR Name (optional)","applyHRName","e.g. Priya Sharma"],["HR Email (optional)","applyHREmail","e.g. priya.sharma@iqvia.com"],["Job Post URL (optional)","applyJobURL","Paste link to the job posting"]].map(([l,f,ph])=>html`
                <div key=${f}>
                  <label style=${{fontSize:10,fontWeight:700,color:T.textMuted,display:"block",marginBottom:4}}>${l.toUpperCase()}</label>
                  <input placeholder=${ph} value=${
                    f==="applyCompany"?applyCompany:
                    f==="applyRole"?applyRole:
                    f==="applyHRName"?applyHRName:
                    f==="applyHREmail"?applyHREmail:applyJobURL
                  } onInput=${e=>{
                    if(f==="applyCompany")setApplyCompany(e.target.value);
                    else if(f==="applyRole")setApplyRole(e.target.value);
                    else if(f==="applyHRName")setApplyHRName(e.target.value);
                    else if(f==="applyHREmail")setApplyHREmail(e.target.value);
                    else setApplyJobURL(e.target.value);
                  }} style=${inp}/>
                </div>
              `)}
            </div>
            <div>
              <label style=${{fontSize:10,fontWeight:700,color:T.textMuted,display:"block",marginBottom:4}}>JOB DESCRIPTION — paste the full JD for best results</label>
              <textarea placeholder="Paste the complete job description here. The more detail, the more tailored your documents will be..." value=${applyJD} onInput=${e=>setApplyJD(e.target.value)} style=${{...inp,minHeight:130,resize:"vertical"}}/>
            </div>
          </div>

          <!-- CV UPLOAD -->
          <div style=${card}>
            <p style=${{fontSize:13,fontWeight:700,color:T.text,marginBottom:4}}>Your CV</p>
            <p style=${{fontSize:12,color:T.textMuted,marginBottom:14}}>Upload your current CV as PDF. Claude reads it directly and optimizes based on the JD. If you skip this, your saved profile is used instead.</p>
            <div style=${{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
              <label style=${{cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,padding:"9px 18px",borderRadius:9,border:`2px dashed ${cvBase64?T.greenBorder:T.primaryBorder}`,background:cvBase64?T.greenLight:T.primaryLight,color:cvBase64?T.green:T.primary,fontSize:13,fontWeight:600,transition:"all .15s"}}>
                <${Ico} d=${IC.file} s=${16} c=${cvBase64?T.green:T.primary}/>
                ${cvBase64?"CV Loaded ✓ — tap to change":"Upload CV (PDF)"}
                <input type="file" accept=".pdf" onChange=${handleCVUpload} style=${{display:"none"}}/>
              </label>
              ${cvBase64&&html`
                <div style=${{flex:1}}>
                  <p style=${{fontSize:12,color:T.green,fontWeight:600}}>${cvFileName}</p>
                  <p style=${{fontSize:11,color:T.textMuted}}>Claude will read and optimize this CV for the role</p>
                </div>
                <button onClick=${()=>{setCvBase64("");setCvFileName("");setCvFile(null);}} style=${{...btnG,padding:"6px 12px",fontSize:12,color:T.red,borderColor:"#fca5a5"}}>Remove</button>
              `}
              ${!cvBase64&&html`<p style=${{fontSize:12,color:T.textMuted}}>Not uploaded — will use your saved profile details</p>`}
            </div>
          </div>

          <!-- GENERATE BUTTONS -->
          <div style=${{...card,background:"#f8fafc"}}>
            <p style=${{fontSize:13,fontWeight:700,color:T.text,marginBottom:4}}>Generate Documents</p>
            <p style=${{fontSize:12,color:T.textMuted,marginBottom:14}}>Each document is tailored to the specific role and company. Add as much detail above as possible for best results.</p>
            <div style=${{display:"flex",gap:10,flexWrap:"wrap"}}>
              ${[
                {type:"cv",    label:"Optimize My CV",    desc:"Section-by-section rewrite for this role", c:T.primary, bg:T.primaryLight, bc:T.primaryBorder, ico:IC.user},
                {type:"cover", label:"Write Cover Letter",desc:"Professional, quantified, under 280 words",  c:T.pink,   bg:T.pinkLight,    bc:T.pinkBorder,    ico:IC.file},
                {type:"email", label:"Write HR Email",    desc:"Punchy cold email, under 100 words",        c:T.green,  bg:T.greenLight,   bc:T.greenBorder,   ico:IC.mail},
              ].map(({type,label,desc,c,bg,bc,ico})=>html`
                <button key=${type} onClick=${()=>applyGenerate(type)} disabled=${!!applyGenerating}
                  style=${{cursor:"pointer",fontFamily:"inherit",fontWeight:600,display:"flex",flexDirection:"column",alignItems:"flex-start",gap:4,padding:"12px 18px",borderRadius:10,border:`1px solid ${bc}`,background:bg,color:c,fontSize:13,flex:1,minWidth:180,opacity:applyGenerating===type?.5:1,transition:"all .15s"}}>
                  <div style=${{display:"flex",alignItems:"center",gap:7}}>
                    ${applyGenerating===type
                      ?html`<span style=${{width:14,height:14,border:`2px solid ${c}44`,borderTop:`2px solid ${c}`,borderRadius:"50%",display:"inline-block",animation:"spin 1s linear infinite"}}/>`
                      :html`<${Ico} d=${ico} s=${15} c=${c}/>`}
                    ${applyGenerating===type?"Writing...":label}
                  </div>
                  <span style=${{fontSize:11,color:c,opacity:.7,fontWeight:400}}>${desc}</span>
                </button>
              `)}
            </div>
            ${!apiKey&&html`<p style=${{fontSize:11,color:T.red,marginTop:10}}>⚠ Set your API key above (button at top of page) to enable generation</p>`}
          </div>

          <!-- OUTPUTS -->
          ${applyOutputs.cv&&html`
            <div style=${{...card,border:`1px solid ${T.primaryBorder}`}} class="fade">
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:14}}>
                <div>
                  <p style=${{fontSize:14,fontWeight:700,color:T.primary}}>OPTIMIZED CV</p>
                  <p style=${{fontSize:11,color:T.textMuted}}>Tailored for ${applyRole||"this role"}${applyCompany?" at "+applyCompany:""}</p>
                </div>
                <div style=${{display:"flex",gap:8}}>
                  <button onClick=${()=>applyCopy(applyOutputs.cv,"cv")} style=${{...btnG,fontSize:12,padding:"6px 14px",borderColor:applyCopied==="cv"?T.greenBorder:T.border,color:applyCopied==="cv"?T.green:T.textSec}}>
                    <${Ico} d=${applyCopied==="cv"?IC.check:IC.copy} s=${13} c=${applyCopied==="cv"?T.green:T.textSec}/> ${applyCopied==="cv"?"Copied!":"Copy Text"}
                  </button>
                  <button onClick=${downloadCV} style=${{...btnP,fontSize:12,padding:"6px 16px",background:T.primary}}>
                    <${Ico} d=${IC.ext} s=${13} c="#fff"/> Download PDF
                  </button>
                </div>
              </div>
              <pre style=${{fontSize:13,lineHeight:1.8,color:T.text,whiteSpace:"pre-wrap",fontFamily:"inherit",background:"#f8fafc",padding:16,borderRadius:8,overflowX:"auto"}}>${applyOutputs.cv}</pre>
            </div>
          `}

          ${applyOutputs.cover&&html`
            <div style=${{...card,border:`1px solid ${T.pinkBorder}`}} class="fade">
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:14}}>
                <div>
                  <p style=${{fontSize:14,fontWeight:700,color:T.pink}}>COVER LETTER</p>
                  <p style=${{fontSize:11,color:T.textMuted}}>Tailored for ${applyRole||"this role"}${applyCompany?" at "+applyCompany:""}</p>
                </div>
                <div style=${{display:"flex",gap:8}}>
                  <button onClick=${()=>applyCopy(applyOutputs.cover,"cover")} style=${{...btnG,fontSize:12,padding:"6px 14px",borderColor:applyCopied==="cover"?T.greenBorder:T.border,color:applyCopied==="cover"?T.green:T.textSec}}>
                    <${Ico} d=${applyCopied==="cover"?IC.check:IC.copy} s=${13} c=${applyCopied==="cover"?T.green:T.textSec}/> ${applyCopied==="cover"?"Copied!":"Copy Text"}
                  </button>
                  <button onClick=${downloadCoverLetter} style=${{...btnP,fontSize:12,padding:"6px 16px",background:T.pink}}>
                    <${Ico} d=${IC.ext} s=${13} c="#fff"/> Download PDF
                  </button>
                </div>
              </div>
              <pre style=${{fontSize:13,lineHeight:1.9,color:T.text,whiteSpace:"pre-wrap",fontFamily:"Georgia,serif",background:"#fdf2f8",padding:16,borderRadius:8}}>${applyOutputs.cover}</pre>
            </div>
          `}

          ${applyOutputs.email&&html`
            <div style=${{...card,border:`1px solid ${T.greenBorder}`}} class="fade">
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:14}}>
                <div>
                  <p style=${{fontSize:14,fontWeight:700,color:T.green}}>HR EMAIL</p>
                  <p style=${{fontSize:11,color:T.textMuted}}>Ready to copy-paste into Gmail or Outlook</p>
                </div>
                <button onClick=${()=>applyCopy(applyOutputs.email,"email")} style=${{...btnG,fontSize:12,padding:"6px 14px",borderColor:applyCopied==="email"?T.greenBorder:T.border,color:applyCopied==="email"?T.green:T.textSec}}>
                  <${Ico} d=${applyCopied==="email"?IC.check:IC.copy} s=${13} c=${applyCopied==="email"?T.green:T.textSec}/> ${applyCopied==="email"?"Copied!":"Copy Email"}
                </button>
              </div>
              <pre style=${{fontSize:13,lineHeight:1.8,color:T.text,whiteSpace:"pre-wrap",fontFamily:"inherit",background:T.greenLight,padding:16,borderRadius:8}}>${applyOutputs.email}</pre>
            </div>
          `}

          ${Object.keys(applyOutputs).length===0&&html`
            <div style=${{textAlign:"center",padding:40,color:T.textMuted}}>
              <div style=${{fontSize:36,marginBottom:12}}>✍️</div>
              <p style=${{fontSize:14,fontWeight:600,color:T.text,marginBottom:6}}>Fill in the job details above and generate</p>
              <p style=${{fontSize:12,lineHeight:1.6}}>Upload your CV PDF for best results. The AI reads it directly and rewrites it specifically for this role.</p>
            </div>
          `}
        </div>
      `}

      <!-- ── TRACKER TAB ───────────────────────────────────────────────── -->
      ${tab==="tracker"&&html`
        <div>
          <p style=${{fontSize:12,color:T.textMuted,marginBottom:20}}>${tracker.length} applications tracked · Auto-saved to this device</p>
          ${STATUSES.map(status=>{
            const items=tracker.filter(t=>t.status===status);
            const sc=SC[status];
            return html`
              <div key=${status} style=${{marginBottom:24}}>
                <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style=${{width:8,height:8,borderRadius:"50%",background:sc.dot}}/>
                  <span style=${{fontSize:11,fontWeight:700,color:T.textMuted,letterSpacing:".08em"}}>${status.toUpperCase()} (${items.length})</span>
                </div>
                ${items.length===0
                  ?html`<div style=${{padding:"10px 14px",background:"#f8fafc",border:`1px dashed ${T.border}`,borderRadius:9,fontSize:12,color:T.textMuted,textAlign:"center"}}>Empty</div>`
                  :html`<div style=${{display:"flex",flexDirection:"column",gap:8}}>
                    ${items.map(job=>html`
                      <div key=${job.id} style=${card} class="fade">
                        <div style=${{display:"flex",justifyContent:"space-between",gap:10,marginBottom:10}}>
                          <div style=${{flex:1}}>
                            <div style=${{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
                              <span style=${{fontSize:14,fontWeight:700}}>${job.title}</span>
                              <span style=${{fontSize:11,padding:"2px 8px",borderRadius:100,fontWeight:600,background:job.city==="Bangalore"?T.primaryLight:T.greenLight,color:job.city==="Bangalore"?T.primary:T.green}}>${job.city}</span>
                              <span style=${{fontSize:11,padding:"2px 8px",borderRadius:100,background:sc.badge,color:sc.text,fontWeight:600}}>${status}</span>
                            </div>
                            <p style=${{fontSize:12,color:T.textSec}}>${job.company} · ${job.dateAdded||job.addedAt}</p>
                          </div>
                          <div style=${{display:"flex",gap:6,flexShrink:0}}>
                            ${job.url&&html`<a href=${job.url} target="_blank" rel="noopener noreferrer" style=${{display:"inline-flex",padding:"5px 11px",background:T.primaryLight,border:`1px solid ${T.primaryBorder}`,color:T.primary,borderRadius:8,fontSize:11,fontWeight:600,alignItems:"center"}}>View Post</a>`}
                            <button onClick=${()=>remTrack(job.id)} style=${{cursor:"pointer",fontFamily:"inherit",display:"inline-flex",padding:"5px 8px",background:T.redLight,border:"1px solid #fca5a5",borderRadius:8,color:T.red}}><${Ico} d=${IC.trash} s=${14} c=${T.red}/></button>
                          </div>
                        </div>
                        <div style=${{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
                          ${STATUSES.map(s=>html`
                            <button key=${s} onClick=${()=>updStatus(job.id,s)} style=${{cursor:"pointer",fontFamily:"inherit",padding:"3px 10px",borderRadius:100,border:`1px solid ${job.status===s?SC[s].dot:T.border}`,background:job.status===s?SC[s].badge:"transparent",color:job.status===s?SC[s].text:T.textSec,fontSize:11,fontWeight:500}}>${s}</button>
                          `)}
                        </div>
                        <textarea placeholder="Notes: HR contact, follow-up date, interview prep..." value=${job.notes} onInput=${e=>updNotes(job.id,e.target.value)} style=${{...inp,minHeight:50,resize:"vertical",fontSize:12,color:T.textSec}}/>
                      </div>
                    `)}
                  </div>`}
              </div>
            `;
          })}
          ${tracker.length===0&&html`
            <div style=${{textAlign:"center",padding:52,...card}}>
              <div style=${{width:52,height:52,borderRadius:"50%",background:T.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}><${Ico} d=${IC.brief} s=${22} c=${T.primary}/></div>
              <p style=${{fontSize:14,fontWeight:600,color:T.text,marginBottom:6}}>No applications tracked yet</p>
              <p style=${{fontSize:12,color:T.textMuted}}>Add real jobs in My Jobs, then tap Track to manage your pipeline</p>
            </div>
          `}
        </div>
      `}

      <!-- ── PROFILE TAB ───────────────────────────────────────────────── -->
      ${tab==="profile"&&html`
        <div style=${{display:"flex",flexDirection:"column",gap:14}}>
          <div style=${{background:`linear-gradient(135deg,${T.primaryLight},#f0fdf4)`,border:`1px solid ${T.primaryBorder}`,borderRadius:14,padding:22}}>
            <h2 style=${{fontSize:20,fontWeight:800,marginBottom:4}}>${PROFILE.name}</h2>
            <p style=${{color:T.primary,fontSize:13,fontWeight:500,marginBottom:12}}>${PROFILE.degree}</p>
            <div style=${{display:"flex",gap:14,flexWrap:"wrap",fontSize:12,color:T.textSec}}>
              <span>✉ ${PROFILE.email}</span><span>📱 ${PROFILE.phone}</span><span>📍 ${PROFILE.location}</span>
            </div>
          </div>
          ${[
            {label:"SUMMARY",c:T.textMuted,content:html`<p style=${{fontSize:13,color:T.textSec,lineHeight:1.75,margin:0}}>${PROFILE.summary}</p>`},
            {label:"EXPERIENCE",c:T.textMuted,content:html`<div>${PROFILE.experience.map((e,i)=>html`
              <div key=${i} style=${{marginBottom:i<PROFILE.experience.length-1?18:0}}>
                <p style=${{fontSize:14,fontWeight:700,marginBottom:2}}>${e.role}</p>
                <p style=${{fontSize:12,color:T.primary,fontWeight:500,marginBottom:7}}>${e.company} · ${e.period}</p>
                <ul style=${{paddingLeft:18,margin:0}}>${e.bullets.map((b,j)=>html`<li key=${j} style=${{fontSize:12,color:T.textSec,lineHeight:1.65,marginBottom:4}}>${b}</li>`)}</ul>
              </div>`)}</div>`},
            {label:"SKILLS",c:T.textMuted,content:html`<div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>${PROFILE.skills.map(s=>html`<span key=${s} style=${{fontSize:11,padding:"5px 12px",borderRadius:100,background:T.primaryLight,color:T.primary,border:`1px solid ${T.primaryBorder}`,fontWeight:500}}>${s}</span>`)}</div>`},
            {label:"CERTIFICATIONS IN PROGRESS",c:T.green,content:html`<div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>${PROFILE.certifications.map(c=>html`<span key=${c} style=${{fontSize:11,padding:"5px 12px",borderRadius:100,background:T.greenLight,color:T.green,border:`1px solid ${T.greenBorder}`,fontWeight:500}}>${c}</span>`)}</div>`},
            {label:"TARGET ROLES",c:T.amber,content:html`<div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>${PROFILE.targetRoles.map(r=>html`<span key=${r} style=${{fontSize:11,padding:"5px 12px",borderRadius:100,background:T.amberLight,color:T.amber,border:`1px solid ${T.amberBorder}`,fontWeight:500}}>${r}</span>`)}</div>`}
          ].map(({label,c,content})=>html`
            <div key=${label} style=${card}>
              <p style=${{fontSize:11,fontWeight:700,color:c,letterSpacing:".08em",marginBottom:14}}>${label}</p>
              ${content}
            </div>
          `)}
        </div>
      `}
    </div>
  </div>`;
}

createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
