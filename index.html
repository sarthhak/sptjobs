// ── API ───────────────────────────────────────────────────────────────────
async function callClaude(messages,apiKey,jsonMode=false){
  const body={model:"claude-sonnet-4-20250514",max_tokens:2000,messages};
  if(jsonMode)body.system="You are a JSON generator. Output ONLY valid JSON. No markdown, no backticks, no explanation.";
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true","anthropic-version":"2023-06-01","x-api-key":apiKey},
    body:JSON.stringify(body)
  });
  if(!res.ok){const t=await res.text().catch(()=>"");throw new Error(`HTTP ${res.status}: ${t.slice(0,100)}`);}
  const d=await res.json();
  if(d.error)throw new Error(d.error.message||"API error");
  const texts=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text);
  if(!texts.length)throw new Error("Empty response");
  return texts.join("\n");
}

                  <option value="Bangalore">Bangalore</option>
                  <option value="Pune">Pune</option>
                </select>
              </div>
              <button onClick=${launchSearch} style=${{...btnP,fontSize:14,gap:8}}>
                <${Ico} d=${IC.ext} s=${16} c="#fff"/> Launch Job Search
              </button>
            </div>
            ${activeKW.length>0&&html`<p style=${{fontSize:11,color:T.textMuted,marginTop:10}}>Searching for: ${activeKW.join(" · ")}</p>`}
          </div>

          <!-- PLATFORM CARDS — shown after launch -->
          ${launched&&platforms.length>0&&html`
            <div class="fade">
              <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <p style=${{fontSize:13,fontWeight:600,color:T.text}}>Live job searches — tap any platform to browse real openings</p>
                <span style=${{fontSize:11,color:T.textMuted}}>${platforms.length} platforms</span>
              </div>
              <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                ${platforms.map(p=>html`
                  <a key=${p.name} href=${p.url} target="_blank" rel="noopener noreferrer"
                    style=${{display:"flex",flexDirection:"column",gap:8,padding:"14px 16px",borderRadius:12,border:`2px solid ${p.color}22`,background:T.surface,boxShadow:"0 1px 3px rgba(0,0,0,.06)",transition:"all .2s"}}
                    onMouseOver=${e=>{e.currentTarget.style.borderColor=p.color;e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.1)"}}
                    onMouseOut=${e=>{e.currentTarget.style.borderColor=`${p.color}22`;e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 1px 3px rgba(0,0,0,.06)"}}>
                    <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style=${{display:"flex",alignItems:"center",gap:8}}>
                        <span style=${{width:28,height:28,borderRadius:7,background:p.color,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,flexShrink:0}}>${p.abbr}</span>
                        <span style=${{fontSize:14,fontWeight:700,color:T.text}}>${p.name}</span>
                      </div>
                      <span style=${{fontSize:11,color:p.color,fontWeight:600}}>Open →</span>
                    </div>
                    <p style=${{fontSize:11,color:T.textMuted,lineHeight:1.5}}>${p.desc}</p>
                  </a>
                `)}
              </div>
              <div style=${{marginTop:14,padding:"12px 16px",background:"#fefce8",border:"1px solid #fde68a",borderRadius:10,fontSize:12,color:T.amber,lineHeight:1.6}}>
                💡 <strong>Tip:</strong> Find a role you like → copy the job title, company, and paste the JD below → tap <strong>Add a Real Job</strong> → get your AI-generated cover letter in seconds.
              </div>
            </div>
          `}

          <!-- ADD REAL JOB FORM -->
          <div style=${card}>
            <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <p style=${{fontSize:14,fontWeight:700,color:T.text,marginBottom:2}}>Add a Real Job</p>
                <p style=${{fontSize:12,color:T.textMuted}}>Found a role on one of the platforms above? Add it here to generate your documents.</p>
              </div>
              <button onClick=${()=>setShowAdd(!showAdd)} style=${{...btnP,fontSize:13,padding:"8px 16px"}}>
                <${Ico} d=${IC.plus} s=${15} c="#fff"/> ${showAdd?"Cancel":"Add Job"}
              </button>
            </div>

            ${showAdd&&html`
              <div style=${{marginTop:16,padding:16,background:T.primaryLight,border:`1px solid ${T.primaryBorder}`,borderRadius:10}} class="fade">
                <div style=${{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                  ${[["Job Title *","title","e.g. Clinical Data Intern"],["Company *","company","e.g. IQVIA"],["City","city","Bangalore / Pune"],["Job Post URL","url","Paste link from job portal"]].map(([l,f,ph])=>html`
                    <div key=${f}>
                      <label style=${{fontSize:10,fontWeight:700,color:T.textMuted,display:"block",marginBottom:4}}>${l}</label>
                      <input placeholder=${ph} value=${addForm[f]} onInput=${e=>setAddForm(p=>({...p,[f]:e.target.value}))} style=${inp}/>
                    </div>
                  `)}
                </div>
                <div style=${{marginBottom:12}}>
                  <label style=${{fontSize:10,fontWeight:700,color:T.textMuted,display:"block",marginBottom:4}}>JOB DESCRIPTION — paste from the listing (the more you paste, the better your documents)</label>
                  <textarea placeholder="Paste the full job description here..." value=${addForm.jd} onInput=${e=>setAddForm(p=>({...p,jd:e.target.value}))} style=${{...inp,minHeight:100,resize:"vertical"}}/>
                </div>
                <button onClick=${addRealJob} style=${{...btnP,fontSize:13,padding:"9px 20px"}}>
                  <${Ico} d=${IC.plus} s=${15} c="#fff"/> Add This Job
                </button>
              </div>
            `}
          </div>

          <!-- EMPTY STATE -->
          ${!launched&&html`
            <div style=${{textAlign:"center",padding:40}}>
              <div style=${{width:56,height:56,borderRadius:"50%",background:T.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}>
                <${Ico} d=${IC.search} s=${24} c=${T.primary}/>
              </div>
              <p style=${{fontSize:15,fontWeight:600,color:T.text,marginBottom:6}}>Select your keywords and launch</p>
              <p style=${{fontSize:13,color:T.textMuted}}>All job results come from real, live job boards — no AI-generated listings</p>
            </div>
          `}
        </div>
      `}

      <!-- ── MY JOBS TAB ─────────────────────────────────────────────── -->
      ${tab==="myjobs"&&html`
        <div>
          <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div>
              <p style=${{fontSize:15,fontWeight:700,color:T.text,marginBottom:2}}>${myJobs.length} real job${myJobs.length!==1?"s":""} saved</p>
              <p style=${{fontSize:12,color:T.textMuted}}>Generate AI documents for each real role you've found</p>
            </div>
            <button onClick=${()=>{setTab("search");setShowAdd(true);}} style=${{...btnP,fontSize:13,padding:"8px 16px"}}><${Ico} d=${IC.plus} s=${14} c="#fff"/> Add Job</button>
          </div>

          ${myJobs.length===0&&html`
            <div style=${{textAlign:"center",padding:56,...card}}>
              <div style=${{width:56,height:56,borderRadius:"50%",background:T.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><${Ico} d=${IC.spark} s=${24} c=${T.primary}/></div>
              <p style=${{fontSize:15,fontWeight:600,color:T.text,marginBottom:6}}>No jobs added yet</p>
              <p style=${{fontSize:13,color:T.textMuted,marginBottom:16}}>Go to Find Jobs, browse real listings, then add roles here</p>
              <button onClick=${()=>setTab("search")} style=${{...btnP,fontSize:13,padding:"9px 20px"}}>Find Real Jobs →</button>
            </div>
          `}

          <div style=${{display:"flex",flexDirection:"column",gap:14}}>
            ${myJobs.map(job=>html`
              <div key=${job.id} style=${card} class="fade">
                <!-- JOB HEADER -->
                <div style=${{display:"flex",gap:12,marginBottom:12}}>
                  <div style=${{flex:1}}>
                    <div style=${{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                      <span style=${{fontSize:16,fontWeight:700,color:T.text}}>${job.title}</span>
                      <span style=${{fontSize:11,padding:"2px 10px",borderRadius:100,fontWeight:600,background:job.city==="Bangalore"?T.primaryLight:T.greenLight,color:job.city==="Bangalore"?T.primary:T.green}}>${job.city}</span>
                    </div>
                    <p style=${{fontSize:14,color:T.textSec,fontWeight:500,marginBottom:4}}>${job.company}</p>
                    <p style=${{fontSize:11,color:T.textMuted}}>Added ${job.addedAt}</p>
                  </div>
                  <div style=${{display:"flex",gap:6,flexShrink:0,alignItems:"flex-start"}}>
                    ${job.url&&html`<a href=${job.url} target="_blank" rel="noopener noreferrer" style=${{display:"inline-flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:8,background:T.primaryLight,border:`1px solid ${T.primaryBorder}`,color:T.primary,fontSize:12,fontWeight:600}}>
                      <${Ico} d=${IC.ext} s=${13} c=${T.primary}/> View Post
                    </a>`}
                    <button onClick=${()=>addTrack(job)} style=${{...btnG,padding:"6px 12px",fontSize:12}}><${Ico} d=${IC.brief} s=${13}/> Track</button>
                    <button onClick=${()=>removeJob(job.id)} style=${{cursor:"pointer",fontFamily:"inherit",display:"inline-flex",alignItems:"center",padding:"6px 8px",background:T.redLight,border:"1px solid #fca5a5",borderRadius:8,color:T.red}}><${Ico} d=${IC.trash} s=${14} c=${T.red}/></button>
                  </div>
                </div>

                ${job.jd&&html`
                  <div style=${{marginBottom:12}}>
                    <button onClick=${()=>setExpandedJob(expandedJob===job.id?null:job.id)} style=${{...btnG,padding:"5px 12px",fontSize:11,border:"none",color:T.textMuted,background:"#f8fafc"}}>
                      ${expandedJob===job.id?"▲ Hide JD":"▼ View pasted JD"}
                    </button>
                    ${expandedJob===job.id&&html`<p style=${{marginTop:10,fontSize:12,color:T.textSec,lineHeight:1.7,padding:"12px",background:"#f8fafc",borderRadius:8,whiteSpace:"pre-wrap"}} class="fade">${job.jd}</p>`}
                  </div>
                `}

                <!-- AI DOCUMENT BUTTONS -->
                <div style=${{display:"flex",gap:8,flexWrap:"wrap",padding:"12px 0",borderTop:`1px solid ${T.border}`}}>
                  <p style=${{fontSize:11,color:T.textMuted,width:"100%",marginBottom:4}}>AI-GENERATED DOCUMENTS</p>
                  ${DOCS.map(({type,label,c,bg,bc,ico})=>html`
                    <button key=${type} onClick=${()=>generate(job,type)} disabled=${!!generating}
                      style=${{cursor:"pointer",fontFamily:"inherit",fontWeight:600,display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:9,border:`1px solid ${bc}`,background:bg,color:c,fontSize:13,opacity:generating===`${job.id}-${type}`?.5:1,transition:"opacity .15s"}}>
                      <${Ico} d=${ico} s=${14} c=${c}/> ${generating===`${job.id}-${type}`?"Writing...":label}
                    </button>
                  `)}
                </div>

                <!-- GENERATED DOCUMENTS -->
                ${DOCS.map(({type,label,c,bg,bc})=>{
                  const key=`${job.id}-${type}`;
                  const content=generated[key];
                  if(!content)return null;
                  return html`
                    <div key=${type} style=${{marginTop:10,padding:16,background:bg,border:`1px solid ${bc}`,borderRadius:10}} class="fade">
                      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                        <span style=${{fontSize:11,fontWeight:700,color:c,letterSpacing:".07em"}}>${label.toUpperCase()}</span>
                        <button onClick=${()=>copyText(content,key)} style=${{cursor:"pointer",fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:5,padding:"5px 12px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:8,color:copied===key?T.green:T.textSec,fontSize:12,fontWeight:500}}>
                          <${Ico} d=${copied===key?IC.check:IC.copy} s=${13} c=${copied===key?T.green:T.textSec}/> ${copied===key?"Copied!":"Copy All"}
                        </button>
                      </div>
                      <pre style=${{margin:0,fontSize:13,lineHeight:1.8,color:T.text,whiteSpace:"pre-wrap",fontFamily:"inherit"}}>${content}</pre>
                    </div>
                  `;
                })}
              </div>
            `)}
          </div>
        </div>
      `}

      <!-- ── TRACKER TAB ────────────────────────────────────────────── -->
      ${tab==="tracker"&&html`
        <div>
          <p style=${{fontSize:12,color:T.textMuted,marginBottom:20}}>${tracker.length} applications tracked · Auto-saved</p>
          ${STATUSES.map(status=>{
            const items=tracker.filter(t=>t.status===status);
            const sc=SC[status];
            return html`
              <div key=${status} style=${{marginBottom:24}}>
                <div style=${{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style=${{width:8,height:8,borderRadius:"50%",background:sc.dot}}/>
                  <span style=${{fontSize:11,fontWeight:700,color:T.textMuted,letterSpacing:".08em"}}>${status.toUpperCase()}</span>
                  <span style=${{fontSize:11,color:T.textMuted}}>(${items.length})</span>
                </div>
                ${items.length===0
                  ?html`<div style=${{padding:"10px 14px",background:"#f8fafc",border:`1px dashed ${T.border}`,borderRadius:9,fontSize:12,color:T.textMuted,textAlign:"center"}}>Empty</div>`
                  :html`<div style=${{display:"flex",flexDirection:"column",gap:8}}>
                    ${items.map(job=>html`
                      <div key=${job.id} style=${card} class="fade">
                        <div style=${{display:"flex",justifyContent:"space-between",gap:10,marginBottom:10}}>
                          <div style=${{flex:1}}>
                            <div style=${{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:4}}>
                              <span style=${{fontSize:14,fontWeight:700}}>${job.title}</span>
                              <span style=${{fontSize:11,padding:"2px 8px",borderRadius:100,fontWeight:600,background:job.city==="Bangalore"?T.primaryLight:T.greenLight,color:job.city==="Bangalore"?T.primary:T.green}}>${job.city}</span>
                              <span style=${{fontSize:11,padding:"2px 8px",borderRadius:100,background:sc.badge,color:sc.text,fontWeight:600}}>${status}</span>
                            </div>
                            <p style=${{fontSize:12,color:T.textSec}}>${job.company} · ${job.dateAdded||job.addedAt}</p>
                          </div>
                          <div style=${{display:"flex",gap:6,flexShrink:0}}>
                            ${job.url&&html`<a href=${job.url} target="_blank" rel="noopener noreferrer" style=${{display:"inline-flex",alignItems:"center",padding:"5px 11px",background:T.primaryLight,border:`1px solid ${T.primaryBorder}`,color:T.primary,borderRadius:8,fontSize:11,fontWeight:600}}>View Post</a>`}
                            <button onClick=${()=>remTrack(job.id)} style=${{cursor:"pointer",fontFamily:"inherit",display:"inline-flex",alignItems:"center",padding:"5px 8px",background:T.redLight,border:"1px solid #fca5a5",borderRadius:8,color:T.red}}>
                              <${Ico} d=${IC.trash} s=${14} c=${T.red}/>
                            </button>
                          </div>
                        </div>
                        <div style=${{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
                          ${STATUSES.map(s=>html`
                            <button key=${s} onClick=${()=>updStatus(job.id,s)} style=${{cursor:"pointer",fontFamily:"inherit",padding:"3px 10px",borderRadius:100,border:`1px solid ${job.status===s?SC[s].dot:T.border}`,background:job.status===s?SC[s].badge:"transparent",color:job.status===s?SC[s].text:T.textSec,fontSize:11,fontWeight:500}}>
                              ${s}
                            </button>
                          `)}
                        </div>
                        <textarea placeholder="Notes: HR contact, interview date, prep points..." value=${job.notes} onInput=${e=>updNotes(job.id,e.target.value)}
                          style=${{...inp,minHeight:52,resize:"vertical",fontSize:12,color:T.textSec}}/>
                      </div>
                    `)}
                  </div>`}
              </div>
            `;
          })}
          ${tracker.length===0&&html`
            <div style=${{textAlign:"center",padding:52,...card}}>
              <div style=${{width:52,height:52,borderRadius:"50%",background:T.primaryLight,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}><${Ico} d=${IC.brief} s=${22} c=${T.primary}/></div>
              <p style=${{fontSize:14,fontWeight:600,color:T.text,marginBottom:6}}>No applications tracked yet</p>
              <p style=${{fontSize:12,color:T.textMuted}}>Add real jobs and tap Track to manage your pipeline here</p>
            </div>
          `}
        </div>
      `}

      <!-- ── PROFILE TAB ─────────────────────────────────────────────── -->
      ${tab==="profile"&&html`
        <div style=${{display:"flex",flexDirection:"column",gap:14}}>
          <div style=${{background:"linear-gradient(135deg,${T.primaryLight},#f0fdf4)",border:`1px solid ${T.primaryBorder}`,borderRadius:14,padding:22}}>
            <h2 style=${{fontSize:20,fontWeight:800,color:T.text,marginBottom:4}}>${PROFILE.name}</h2>
            <p style=${{color:T.primary,fontSize:13,fontWeight:500,marginBottom:12}}>${PROFILE.degree}</p>
            <div style=${{display:"flex",gap:14,flexWrap:"wrap",fontSize:12,color:T.textSec}}>
              <span>✉ ${PROFILE.email}</span><span>📱 ${PROFILE.phone}</span><span>📍 ${PROFILE.location}</span>
            </div>
          </div>
          ${[
            {label:"SUMMARY",c:T.textMuted,content:html`<p style=${{fontSize:13,color:T.textSec,lineHeight:1.75,margin:0}}>${PROFILE.summary}</p>`},
            {label:"EXPERIENCE",c:T.textMuted,content:html`<div>${PROFILE.experience.map((e,i)=>html`
              <div key=${i} style=${{marginBottom:i<PROFILE.experience.length-1?18:0}}>
                <p style=${{fontSize:14,fontWeight:700,color:T.text,marginBottom:2}}>${e.role}</p>
                <p style=${{fontSize:12,color:T.primary,fontWeight:500,marginBottom:7}}>${e.company} · ${e.period}</p>
                <ul style=${{paddingLeft:18,margin:0}}>${e.bullets.map((b,j)=>html`<li key=${j} style=${{fontSize:12,color:T.textSec,lineHeight:1.65,marginBottom:4}}>${b}</li>`)}</ul>
              </div>`)}</div>`},
            {label:"SKILLS",c:T.textMuted,content:html`<div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>${PROFILE.skills.map(s=>html`<span key=${s} style=${{fontSize:11,padding:"5px 12px",borderRadius:100,background:T.primaryLight,color:T.primary,border:`1px solid ${T.primaryBorder}`,fontWeight:500}}>${s}</span>`)}</div>`},
            {label:"CERTIFICATIONS IN PROGRESS",c:T.green,content:html`<div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>${PROFILE.certifications.map(c=>html`<span key=${c} style=${{fontSize:11,padding:"5px 12px",borderRadius:100,background:T.greenLight,color:T.green,border:`1px solid ${T.greenBorder}`,fontWeight:500}}>${c}</span>`)}</div>`},
            {label:"TARGET ROLES",c:T.amber,content:html`<div style=${{display:"flex",gap:7,flexWrap:"wrap"}}>${PROFILE.targetRoles.map(r=>html`<span key=${r} style=${{fontSize:11,padding:"5px 12px",borderRadius:100,background:T.amberLight,color:T.amber,border:"1px solid #fde68a",fontWeight:500}}>${r}</span>`)}</div>`}
          ].map(({label,c,content})=>html`
            <div key=${label} style=${card}>
              <p style=${{fontSize:11,fontWeight:700,color:c,letterSpacing:".08em",marginBottom:14}}>${label}</p>
              ${content}
            </div>
          `)}
        </div>
      `}
    </div>
  </div>`;
}

createRoot(document.getElementById("root")).render(html`<${App}/>`);
</script>
</body>
</html>
